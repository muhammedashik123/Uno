<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="ring" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#5a2b9e"/>
      <stop offset="70%" stop-color="#3a1d7a"/>
      <stop offset="100%" stop-color="#1a0e3e"/>
    </radialGradient>
    <linearGradient id="ringEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c23bff"/>
      <stop offset="50%" stop-color="#7b3bff"/>
      <stop offset="100%" stop-color="#2aa8ff"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd23f"/>
      <stop offset="38%" stop-color="#ff8a3c"/>
      <stop offset="62%" stop-color="#ff5aa6"/>
      <stop offset="100%" stop-color="#3aa0ff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="55%" stop-color="#ffb02e"/>
      <stop offset="100%" stop-color="#f06a1e"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2b8e"/>
      <stop offset="100%" stop-color="#2a1559"/>
    </linearGradient>
  </defs>

  <!-- glow ring badge -->
  <ellipse cx="256" cy="250" rx="232" ry="210" fill="url(#ringEdge)" opacity=".9"/>
  <ellipse cx="256" cy="250" rx="214" ry="192" fill="url(#ring)"/>
  <ellipse cx="256" cy="250" rx="214" ry="192" fill="none" stroke="#2aa8ff" stroke-width="5" opacity=".7"/>

  <!-- fanned cards -->
  <g stroke="#fff" stroke-width="7" stroke-linejoin="round">
    <g transform="rotate(-26 256 235)"><rect x="150" y="78" width="74" height="118" rx="13" fill="#e23131"/></g>
    <g transform="rotate(-13 256 235)"><rect x="186" y="60" width="74" height="118" rx="13" fill="#f5b21e"/></g>
    <g transform="rotate(0 256 235)"><rect x="219" y="52" width="74" height="118" rx="13" fill="#36c447"/></g>
    <g transform="rotate(13 256 235)"><rect x="252" y="60" width="74" height="118" rx="13" fill="#2a8ae0"/></g>
    <g transform="rotate(26 256 235)"><rect x="288" y="78" width="74" height="118" rx="13" fill="#141414"/></g>
  </g>
  <g fill="#fff" font-family="Arial, sans-serif" font-weight="900" font-size="34" text-anchor="middle">
    <text x="170" y="136" transform="rotate(-26 256 235)">1</text>
    <text x="208" y="118" transform="rotate(-13 256 235)">2</text>
    <text x="256" y="110" transform="rotate(0 256 235)">3</text>
    <text x="289" y="118" transform="rotate(13 256 235)">4</text>
    <text x="318" y="136" transform="rotate(26 256 235)" font-size="26">+4</text>
  </g>
  <g transform="rotate(26 256 235)">
    <g transform="translate(325 151) rotate(-30)">
      <path d="M0 0 L26 0 A26 26 0 0 1 0 26 Z" fill="#2a8ae0"/>
      <path d="M0 0 L0 26 A26 26 0 0 1 -26 0 Z" fill="#36c447"/>
      <path d="M0 0 L-26 0 A26 26 0 0 1 0 -26 Z" fill="#f5b21e"/>
      <path d="M0 0 L0 -26 A26 26 0 0 1 26 0 Z" fill="#e23131"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#fff" stroke-width="4"/>
    </g>
  </g>

  <!-- crown over the W -->
  <g transform="translate(96 300)" fill="url(#gold)" stroke="#a85a00" stroke-width="3" stroke-linejoin="round">
    <path d="M-28 22 L-28 -6 L-13 9 L0 -16 L13 9 L28 -6 L28 22 Z"/>
  </g>

  <!-- WILDCARD wordmark -->
  <text x="256" y="372" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-style="italic"
        font-size="86" letter-spacing="-2" text-anchor="middle" fill="url(#word)"
        stroke="#2a0f4e" stroke-width="8" paint-order="stroke">WILDCARD</text>

  <!-- ribbon -->
  <g transform="translate(256 432)">
    <rect x="-140" y="-21" width="280" height="44" rx="22" fill="url(#ribbon)" stroke="#7b3bff" stroke-width="4"/>
    <line x1="-108" y1="0" x2="-84" y2="0" stroke="#2aa8ff" stroke-width="6" stroke-linecap="round"/>
    <line x1="108" y1="0" x2="84" y2="0" stroke="#2aa8ff" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#fff"
          text-anchor="middle" letter-spacing="4">CARD GAME</text>
  </g>
</svg>
